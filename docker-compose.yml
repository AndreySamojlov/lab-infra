services:
  postgres:
    image: postgres:15.17
    container_name: lab-postgres
    restart: always
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  n8n:
    image: n8nio/n8n:2.11.4
    container_name: lab-n8n
    restart: always
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB}
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_HOST: n8n.samandrey.work
      N8N_PORT: 5678
      N8N_PROTOCOL: https
      N8N_EDITOR_BASE_URL: https://n8n.samandrey.work
      WEBHOOK_URL: https://n8n-tech.samandrey.work
      N8N_METRICS: "true"
      N8N_SECURE_COOKIE: "true"
      N8N_SKIP_AUTH_ON_OAUTH_CALLBACK: "true"
      N8N_PROXY_HOPS: "1"
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_PAYLOAD_SIZE_MAX: 256
      N8N_FORMDATA_FILE_SIZE_MAX: 256
    depends_on:
      - postgres

  n8n-mcp:
    image: ghcr.io/czlonkowski/n8n-mcp:v2.47.13
    container_name: lab-n8n-mcp
    restart: unless-stopped
    environment:
      N8N_MODE: "true"
      MCP_MODE: http
      PORT: 3000
      LOG_LEVEL: ${N8N_MCP_LOG_LEVEL:-info}
      N8N_API_URL: http://n8n:5678
      N8N_API_KEY: ${N8N_MCP_API_KEY}
      MCP_AUTH_TOKEN: ${N8N_MCP_AUTH_TOKEN}
      AUTH_TOKEN: ${N8N_MCP_AUTH_TOKEN}
    depends_on:
      - n8n

  grafana:
    image: grafana/grafana-oss:10.2.3
    container_name: lab-grafana
    restart: always
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_DOMAIN: grafana.samandrey.work
      GF_SERVER_ROOT_URL: https://grafana.samandrey.work
      GF_SERVER_SERVE_FROM_SUB_PATH: "false"
      GF_SECURITY_COOKIE_SECURE: "true"
      GF_SECURITY_COOKIE_SAMESITE: "lax"
      GF_LOG_LEVEL: debug
      GF_SERVER_ROUTER_LOGGING: "true"
      GF_SERVER_PROTOCOL: http
      GF_SERVER_ENABLE_GZIP: "false"

      GF_AUTH_PROXY_ENABLED: "true"
      GF_AUTH_PROXY_HEADER_NAME: X-Forwarded-User
      GF_AUTH_PROXY_HEADER_PROPERTY: username
      GF_AUTH_PROXY_HEADERS: Email:X-Forwarded-Email
      GF_AUTH_PROXY_AUTO_SIGN_UP: "true"
      GF_AUTH_PROXY_ENABLE_LOGIN_TOKEN: "true"
    volumes:
      - grafana_data:/var/lib/grafana

  prometheus:
    image: prom/prometheus:v3.10.0
    container_name: lab-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus

  node-exporter:
    image: prom/node-exporter:v1.10.2
    container_name: lab-node-exporter
    restart: unless-stopped
    command:
      - --path.rootfs=/host
    pid: host
    volumes:
      - /:/host:ro,rslave

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.55.1
    container_name: lab-cadvisor
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
  loki:
    image: grafana/loki:3.0.0
    container_name: lab-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/config.yml
    volumes:
      - ./monitoring/loki/config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki

  promtail:
    image: grafana/promtail:3.0.0
    container_name: lab-promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./monitoring/promtail/config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro

  caddy:
    image: caddy:2.11.2
    container_name: lab-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - default

  # Only Grafana is behind oauth2-proxy (Google SSO).
  # n8n is exposed directly to Caddy and uses its own built-in user
  # management (email + password). See README section 3 for the access model.
  oauth2-proxy-grafana:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.15.1
    container_name: lab-oauth2-proxy-grafana
    restart: unless-stopped
    environment:
      OAUTH2_PROXY_PROVIDER: google
      OAUTH2_PROXY_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID}
      OAUTH2_PROXY_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET}
      OAUTH2_PROXY_COOKIE_SECRET: ${OAUTH2_PROXY_GRAFANA_COOKIE_SECRET}
      OAUTH2_PROXY_EMAIL_DOMAINS: "*"
      OAUTH2_PROXY_ALLOWED_EMAILS: ${ALLOWED_EMAIL}
      OAUTH2_PROXY_HTTP_ADDRESS: 0.0.0.0:4180
      OAUTH2_PROXY_REDIRECT_URL: https://grafana.samandrey.work/oauth2/callback
      OAUTH2_PROXY_UPSTREAMS: http://grafana:3000
      OAUTH2_PROXY_COOKIE_SECURE: "true"
      OAUTH2_PROXY_SET_XAUTHREQUEST: "true"
      OAUTH2_PROXY_PASS_USER_HEADERS: "true"
      OAUTH2_PROXY_PREFER_EMAIL_TO_USER: "true"
      OAUTH2_PROXY_PASS_BASIC_AUTH: "false"
      OAUTH2_PROXY_PASS_AUTHORIZATION_HEADER: "false"

volumes:
  postgres_data:
  grafana_data:
  prometheus_data:
  loki_data:
  caddy_data:
  caddy_config:
